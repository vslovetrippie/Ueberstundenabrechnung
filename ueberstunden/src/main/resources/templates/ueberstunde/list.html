<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
    <title>Überstunden Übersicht</title>
</head>
<body>
    <div class="container">
        <h1>Überstunden Übersicht</h1>

        <a th:href="@{/ueberstunden/neu}">Neue Überstunde erfassen</a>
        <br/><br/>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Datum</th>
                    <th>Stunden</th>
                    <th>Mitarbeiter</th>
                    <th>Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ueberstunde : ${ueberstunden}">
                    <td th:text="${ueberstunde.id}"></td>
                    <td th:text="${ueberstunde.datum}"></td>
                    <td th:text="${ueberstunde.stunden}"></td>
                    <td th:text="${ueberstunde.mitarbeiter.vorname + ' ' + ueberstunde.mitarbeiter.nachname}"></td>
                    <td>
                    	<a th:href="@{/ueberstunden/bearbeiten/{id}(id=${ueberstunde.id})}">Bearbeiten</a>
                        <a th:href="@{/ueberstunden/loeschen/{id}(id=${ueberstunde.id})}">Löschen</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <br/>
        <a th:href="@{/mitarbeiter}">Zurück zur Mitarbeitenden Übersicht</a>
    </div>
</body>
</html>
